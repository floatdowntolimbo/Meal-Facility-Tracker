name: Meal Facility Data Daily Update

on:
  schedule:
    # 한국 시간(KST) 오전 7시 = UTC 오후 10시 (22:00)
    - cron: '0 22 * * *'
  workflow_dispatch:
    # 수동 실행 버튼 활성화

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas gspread google-auth

      # [Step 1] 식품안전나라 데이터 업데이트 (성공했던 I1210 적용)
      - name: Run Food Safety Korea Script
        run: python update_script.py
        env:
          FOOD_API_KEY: ${{ secrets.FOOD_API_KEY }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}

      # [Step 2] 행정안전부 데이터 업데이트
      - name: Run Gov Data Script
        run: python update_script_gov.py
        env:
          DATA_GO_KR_KEY: ${{ secrets.DATA_GO_KR_KEY }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
